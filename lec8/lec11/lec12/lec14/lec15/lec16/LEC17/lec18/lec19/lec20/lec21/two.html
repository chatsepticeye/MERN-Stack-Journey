<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            border:2px solid black;
            background-color: bisque;
            display: flex;
            flex-direction: row;
           width:400px;
           margin:10px;
           padding: 2px;
        }
        #boxleft{
            background-color: aquamarine;
            border:1px solid blue;
            width:47%;
             margin:3px;
           padding: 2px;
            display:flex;
            flex-direction: column;
        };
        #boxright{
            background-color: yellow;
            border:1px solid brown;
             width:47%;
              margin:3px;
              padding: 2px;
           
        };
        p{
            border: 1px solid red;
        }
         .img{
            height:170px;
            width: 170px;
        }
        @media(max-width:640px){
            .container{
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="boxleft">
        <p>TEXT1</p>
        <p>TEXT2</p>
        </div>
       <div id="boxright">
        <img src="bs.jpeg" alt="">
        </div>
   </div>
</body>
</html>
