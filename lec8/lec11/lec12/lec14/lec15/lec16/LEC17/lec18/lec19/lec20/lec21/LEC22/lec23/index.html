<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation ka gyaan</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }
        .container{
            width: 100vw;
            height: 100vh;
            background-color: beige ;
            border:5px solid black;
        }
        .box{
            width: 350px;
            height: 80px;
            background-color: blue;
            border-radius: 10px;
            margin:10px;
            border:4px solid yellow ;
            position:relative;
            /* animation-name: rightMovement;
            animation-duration: 5s;
            /* animation-delay: 2s; */
            /* animation-iteration-count: infinite;
            animation-timing-function: linear; */
            /* animation-direction: alternate; */
            /* animation-fill-mode: both; */
            animation: 5s linear 1s infinite alternate none running rightMovement;
        }
        @keyframes rightMovement{
            from {top:0;
            left:0;
            }
            to{
                top:0;
                left:1200px;
            }
           

        }
         @keyframes leftMovement{
            from {top:550px;
            left:1200px;
            }
            to{
                top:550px;
                left:0px;
            }
           

        }
        #box2{
            width: 350px;
            height: 80px;
            background-color: blue;
            border-radius: 10px;
            margin:10px;
            border:4px solid yellow ;
            position:relative;
             animation: 5s linear 1s infinite alternate none running leftMovement;

        }
        #circle{
             width: 100px;
            height: 100px;
            background-color: blue;
            border-radius: 50px;
            margin:10px;
            border:3px solid yellow ;
            position:relative;
            top:30%;
            left:40%;
             animation: 5s ease-in-out 0s infinite alternate none running circleMovement;

        }
        @keyframes circleMovement{
            0%{
                top:1%;
                left:5%;

            }
            30%{
                top:5%;
                left:90%;

            }
            60%{
                top:50%;
                left:10%;


            }
            100%{
                top:50%;
                left:50%;


            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="box"></div>
        <div id="box2"></div>
        <div id="circle"></div>
    </div>
    
</body>
</html>
