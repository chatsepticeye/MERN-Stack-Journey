<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CARD2</title>
    <style>
         *{
            margin:0;
            padding:0;
            box-sizing: border-box;
        }
        .container{
            width:100vw;
            height:100vh;
            background-color: #8BC6EC;
            background-image: linear-gradient(135deg,#8BC6EC 0%,#9599E2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 750px;
        }
        .card{
            width:400px;
            height: 600px;
            background-color: wheat;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap:25px;
        }  
        .card img{
            width:100%;
            height:30%;
            border-top-left-radius: 20px;
            border-top-right-radius: 20px;
        }
        .textbox{
            display:flex;
            flex-direction: column;
            align-items: center;
            gap:20px;
          
            width:70%;
            text-align: center;;
        }
        #amountbox{
            width:80%;
            height:10%;
            background-color:  #8BC6EC;
            border-radius:10px;
            display:flex;
            justify-content: space-between;
            padding-left:20px;
            padding-right: 20px;
            align-items: center;
        }
        #leftbox{
            width:fit-content;
            display: flex;
            gap:10px;
            height:100%;
            display:flex;
            align-items: center;
        }
        .imgbox img{
            height:3rem;
            width:3.5rem;
            border-radius: 20px;
        }
        .rightbox a{

        }
        #paymentbutton{
            width:80%;
            height:9%;
            background-color: rgb(56, 56, 100);
            border-radius: 10px;
            font-weight: bold;;
             box-shadow: 0 10px 20px rgba(0,0,0,0.19), 0 6px 6px rgba(0,0,0,0.23);
        }
        .cancelbox a{
            text-decoration: none;
            color:rgb(36, 32, 32);
            font-weight: bold;
            font-size: large;
        }
         </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="icons.jpg" alt="">
            <div class="textbox">
                <h2>Order Summary</h2>
                 <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.
                 Minus reprehenderit laborum laudantium corrupti? Impedit,
                  nihil.</p>
            </div>
            <div id="amountbox">
                <div id="leftbox">
                    <div class="imgbox">
                        <img src="apple-music.jpg" alt="">
                    </div>
                    <div class="textamount">
                        <p>Amount</p>
                        <p>$99.9/year</p>
                    </div>

                </div>
                <div class="rightbox">
                    <a href="#">Change</a>
                </div>

            </div>
            <button id="paymentbutton">
                Proceed to Pay
            </button>
            <div class="cancelbox">
                <a href="#">Cancel Order</a>
            </div>
           

        </div>
        

    </div>
    
</body>
</html>
