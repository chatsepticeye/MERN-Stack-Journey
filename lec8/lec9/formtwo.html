<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formtwo</title>
</head>
<body>
    <h2>Job Application</h2>
    <form>
        <label for="name">Name: </label>
        <input type="text" id="name" name="name">
        
        <br>
        <br>
        <label for="PhoneNo.">Enter email:</label>
        <input type="tel" name="PhoneNo." id="PhoneNo.">
         <br>
        <br>
        <label for="file upload">Resume:</label>
        <input type="file" name="file upload" id="file upload">
        <br>
        <br>
        <label for="counter">Experience in years(age):</label>
        <input type="number" name="counter" id="counter" min="0" max="50">
        <fieldset>
            <legend>Skills:</legend>
          
            <input type="checkbox" name="checkbox" id="checkbox1">
            <label for="checkbox1">HTML</label>
           
            <input type="checkbox" name="checkbox" id="checkbox2">
            <label for="checkbox2">JavaScript</label>
          
            <input type="checkbox" name="checkbox" id="checkbox3">
              <label for="checkbox3">CSS</label>
              <br>
          </fieldset>
          <label for="education">Highest education</label>
          <select name="education" id="education">
            <option value="a">A</option>
            <option value="b">B</option>
            <option value="c">C</option>
            <option value="d">D</option>
          </select>
          <fieldset>
            <legend>Availability</legend>
            <label for="radio1">Full-time</label>
            <input type="radio" name="radio" id="radio1">
            <label for="radio2">Part-time</label>
            <input type="radio" name="radio" id="radio2">
          </fieldset>
           </fieldset>
          <label for="textarea1">Additional Commets:</label>
          <br>
          <textarea name="textarea1" id="textarea1" rows="10" cols="30"></textarea>
          <input type="submit" value="submit application">
    </form>
</body>
</html>
